name: Monitor CRAC

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'  # You can specify the version you want

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Use QQ_AUTH_CODE
        env:
          QQ_AUTH_CODE: ${{ secrets.QQ_AUTH_CODE }}
        run: |
          echo "Your QQ_AUTH_CODE is $QQ_AUTH_CODE"